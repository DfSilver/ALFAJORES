<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Empresarial Alfajores</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  doc, updateDoc, deleteDoc, getDocs,
  query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD53CkQk21lrBduJC0KwkRSJJf3x88pVhg",
  authDomain: "alfajores-gyd.firebaseapp.com",
  projectId: "alfajores-gyd",
  storageBucket: "alfajores-gyd.firebasestorage.app",
  messagingSenderId: "76546279177",
  appId: "1:676546279177:web:093828b183b51de52445d8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const formatoCOP = new Intl.NumberFormat("es-CO", {
  style: "currency",
  currency: "COP"
});

/* ======================
   SABORES FIJOS
======================*/
const saboresBase = [
  "cheescake de limon","cheescake de maracuya","lulada","banana pudding",
  "franui","milo crunch","coffe toffe","brownie","caramelo salado",
  "dulce de leche","snowreo","chocolatoso","red velvet","snickers"
];

window.onload = function(){
  const selectPedido = document.getElementById("saborPedido");
  saboresBase.forEach(s => {
    selectPedido.innerHTML += `<option value="${s}">${s}</option>`;
  });
};

/* ======================
   HELPER: Formatear fecha local
======================*/
function fechaLocal(timestamp){
  if(!timestamp) return "Sin fecha";
  const fecha = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  return fecha.toLocaleDateString("es-CO", {
    weekday: "long", year: "numeric", month: "long", day: "numeric"
  });
}

function claveDelDia(timestamp){
  if(!timestamp) return "sin-fecha";
  const fecha = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  return fecha.toISOString().split("T")[0]; // YYYY-MM-DD
}

/* ======================
   REGISTRAR PEDIDO
======================*/
window.registrarPedido = async function(){
  const sabor    = document.getElementById("saborPedido").value;
  const cantidad = parseInt(document.getElementById("cantidadPedido").value);
  const precio   = parseFloat(document.getElementById("precioPedido").value);

  if(!cantidad || !precio){ alert("Completa todos los campos"); return; }

  const q = query(collection(db,"stock"), where("sabor","==",sabor));
  const snap = await getDocs(q);

  if(!snap.empty){
    snap.forEach(async d => {
      await updateDoc(doc(db,"stock",d.id),{ cantidad: d.data().cantidad + cantidad, precio });
    });
  } else {
    await addDoc(collection(db,"stock"),{ sabor, cantidad, precio });
  }
  alert("Pedido guardado correctamente");
};

/* ======================
   REGISTRAR VENTA
======================*/
window.registrarVenta = async function(){
  const sabor        = document.getElementById("saborVenta").value;
  const cantidad     = parseInt(document.getElementById("cantidadVenta").value);
  const vendedor     = document.getElementById("vendedorVenta").value;
  const cliente      = document.getElementById("clienteVenta").value.trim();
  const metodoPago   = document.getElementById("metodoPagoVenta").value;
  const estadoPago   = document.getElementById("estadoPagoVenta").value;

  if(!cantidad){ alert("Cantidad inválida"); return; }
  if(!cliente){ alert("Escribe a quién le vendiste"); return; }

  const q = query(collection(db,"stock"), where("sabor","==",sabor));
  const snap = await getDocs(q);

  if(snap.empty){ alert("No hay stock"); return; }

  let stockActual, precio, stockId;
  snap.forEach(d => {
    stockActual = d.data().cantidad;
    precio      = d.data().precio;
    stockId     = d.id;
  });

  if(cantidad > stockActual){ alert("Stock insuficiente"); return; }

  await updateDoc(doc(db,"stock",stockId),{ cantidad: stockActual - cantidad });

  await addDoc(collection(db,"ventas"),{
    sabor,
    cantidad,
    vendedor,
    cliente,
    metodoPago,
    precio,
    total: precio * cantidad,
    estadoPago,                  // "Realizado" | "No Realizado"
    fecha: serverTimestamp()
  });

  // Limpiar campos
  document.getElementById("cantidadVenta").value = "";
  document.getElementById("clienteVenta").value  = "";
  alert("Venta registrada correctamente");
};

/* ======================
   ELIMINAR STOCK
======================*/
window.eliminarStock = async function(id){
  await deleteDoc(doc(db,"stock",id));
};

/* ======================
   ELIMINAR VENTA
======================*/
window.eliminarVenta = async function(id, sabor, cantidad){
  const q = query(collection(db,"stock"), where("sabor","==",sabor));
  const snap = await getDocs(q);
  snap.forEach(async d => {
    await updateDoc(doc(db,"stock",d.id),{ cantidad: d.data().cantidad + cantidad });
  });
  await deleteDoc(doc(db,"ventas",id));
};

/* ======================
   CAMBIAR ESTADO DE PAGO
======================*/
window.cambiarEstado = async function(id, estadoActual){
  const nuevoEstado = estadoActual === "Realizado" ? "No Realizado" : "Realizado";
  await updateDoc(doc(db,"ventas",id),{ estadoPago: nuevoEstado });
};

/* ======================
   CAMBIAR MÉTODO DE PAGO
======================*/
window.cambiarMetodo = async function(id, metodoActual){
  const nuevoMetodo = metodoActual === "Efectivo" ? "Transferencia" : "Efectivo";
  await updateDoc(doc(db,"ventas",id),{ metodoPago: nuevoMetodo });
};

/* ======================
   STOCK EN TIEMPO REAL
======================*/
onSnapshot(collection(db,"stock"), snapshot => {
  const stockDiv    = document.getElementById("stockActual");
  const selectVenta = document.getElementById("saborVenta");

  stockDiv.innerHTML  = "";
  selectVenta.innerHTML = "";

  snapshot.forEach(d => {
    const data = d.data();
    stockDiv.innerHTML += `
      <div class="card">
        <strong>${data.sabor}</strong><br>
        Cantidad: ${data.cantidad}<br>
        Precio: ${formatoCOP.format(data.precio)}<br>
        <button onclick="eliminarStock('${d.id}')">Eliminar</button>
      </div>`;
    selectVenta.innerHTML += `<option value="${data.sabor}">${data.sabor}</option>`;
  });
});

/* ======================
   VENTAS + RESUMEN + DÍAS
======================*/
onSnapshot(collection(db,"ventas"), snapshot => {

  let totalDann = 0, totalGio = 0;
  let dineroPagadoEfectivo = 0, dineroPagadoTransferencia = 0;

  const ventasDann = document.getElementById("ventasDann");
  const ventasGio  = document.getElementById("ventasGio");
  const ventasDias = document.getElementById("ventasPorDia");

  ventasDann.innerHTML = "";
  ventasGio.innerHTML  = "";

  // Agrupar por día
  const diasMap = {}; // { "YYYY-MM-DD": { label, ventas:[], totalDia:0 } }

  if(snapshot.empty){
    document.getElementById("resumen").innerHTML = `
      <div class="card resumen">
        Dann vendió: 0 unidades | Gio vendió: 0 unidades<br>
        Total cobrado (Efectivo): ${formatoCOP.format(0)}<br>
        Total cobrado (Transferencia): ${formatoCOP.format(0)}
      </div>`;
    ventasDias.innerHTML = "<p>Sin ventas registradas.</p>";
    return;
  }

  // Ordenar snapshot por fecha
  const docs = [];
  snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));
  docs.sort((a,b) => {
    const fa = a.fecha?.toDate?.() ?? new Date(0);
    const fb = b.fecha?.toDate?.() ?? new Date(0);
    return fb - fa; // más reciente primero
  });

  docs.forEach(v => {
    const id = v.id;

    // ── Acumulados de dinero (solo Realizado) ──
    if(v.estadoPago === "Realizado"){
      if(v.metodoPago === "Efectivo")       dineroPagadoEfectivo       += v.total || 0;
      if(v.metodoPago === "Transferencia")  dineroPagadoTransferencia  += v.total || 0;
    }

    // ── Tarjeta de venta ──
    const badgeEstado  = v.estadoPago === "Realizado"
      ? `<span class="badge badge-ok">✅ Realizado</span>`
      : `<span class="badge badge-pend">⏳ No Realizado</span>`;

    const badgeMetodo = v.metodoPago === "Efectivo"
      ? `<span class="badge badge-ef">💵 Efectivo</span>`
      : `<span class="badge badge-tr">🏦 Transferencia</span>`;

    const tarjeta = `
      <div class="card venta-card">
        <div class="venta-header">
          <strong>${v.sabor}</strong> — ${v.cantidad} u
          <span class="venta-total">${formatoCOP.format(v.total)}</span>
        </div>
        <div class="venta-meta">
          👤 Cliente: <strong>${v.cliente || "—"}</strong> &nbsp;|&nbsp;
          🧑‍💼 Vendedor: <strong>${v.vendedor}</strong>
        </div>
        <div class="venta-badges">
          ${badgeEstado} ${badgeMetodo}
        </div>
        <div class="venta-acciones">
          <button onclick="cambiarEstado('${id}','${v.estadoPago}')">
            Cambiar Estado
          </button>
          <button onclick="cambiarMetodo('${id}','${v.metodoPago}')">
            Cambiar Método
          </button>
          <button class="btn-del" onclick="eliminarVenta('${id}','${v.sabor}',${v.cantidad})">
            🗑 Eliminar
          </button>
        </div>
      </div>`;

    // ── Por vendedor ──
    if(v.vendedor === "Dann"){ totalDann += v.cantidad; ventasDann.innerHTML += tarjeta; }
    if(v.vendedor === "Gio") { totalGio  += v.cantidad; ventasGio.innerHTML  += tarjeta; }

    // ── Agrupar por día ──
    const clave = claveDelDia(v.fecha);
    if(!diasMap[clave]){
      diasMap[clave] = { label: fechaLocal(v.fecha), ventas: [], totalDia: 0 };
    }
    diasMap[clave].ventas.push(tarjeta);
    if(v.estadoPago === "Realizado") diasMap[clave].totalDia += v.total || 0;
  });

  // ── Resumen ──
  document.getElementById("resumen").innerHTML = `
    <div class="card resumen">
      <div class="resumen-grid">
        <div>👤 Dann vendió: <strong>${totalDann}</strong> unidades</div>
        <div>👤 Gio vendió: <strong>${totalGio}</strong> unidades</div>
        <div>💵 Cobrado Efectivo: <strong>${formatoCOP.format(dineroPagadoEfectivo)}</strong></div>
        <div>🏦 Cobrado Transferencia: <strong>${formatoCOP.format(dineroPagadoTransferencia)}</strong></div>
        <div class="resumen-total">💰 Total cobrado: <strong>${formatoCOP.format(dineroPagadoEfectivo + dineroPagadoTransferencia)}</strong></div>
      </div>
    </div>`;

  // ── Ventas por día ──
  ventasDias.innerHTML = "";
  const clavesDias = Object.keys(diasMap).sort((a,b) => b.localeCompare(a));

  clavesDias.forEach(clave => {
    const dia = diasMap[clave];
    ventasDias.innerHTML += `
      <details class="dia-block" open>
        <summary class="dia-summary">
          📅 ${dia.label}
          <span class="dia-total">Total cobrado ese día: ${formatoCOP.format(dia.totalDia)}</span>
        </summary>
        ${dia.ventas.join("")}
      </details>`;
  });
});
</script>

<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    padding: 30px;
    color: #2c3e50;
    max-width: 900px;
    margin: auto;
  }
  h2 {
    border-left: 4px solid #34495e;
    padding-left: 10px;
    margin-top: 35px;
  }
  .card {
    background: white;
    padding: 15px 18px;
    margin: 10px 0;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.07);
  }
  .resumen { background: #eaf4fb; }
  .resumen-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .resumen-total {
    grid-column: 1 / -1;
    font-size: 1.1em;
    margin-top: 6px;
    border-top: 1px solid #ccc;
    padding-top: 6px;
  }

  /* Formularios */
  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  input, select {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.95em;
    flex: 1;
    min-width: 140px;
  }

  /* Botones */
  button {
    padding: 7px 13px;
    background: #34495e;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.88em;
    transition: background 0.2s;
  }
  button:hover { background: #2c3e50; }
  .btn-del { background: #c0392b; }
  .btn-del:hover { background: #a93226; }

  /* Tarjeta de venta */
  .venta-card { border-left: 4px solid #3498db; }
  .venta-header {
    display: flex;
    justify-content: space-between;
    font-size: 1.05em;
    margin-bottom: 6px;
  }
  .venta-total { color: #27ae60; font-weight: bold; }
  .venta-meta { font-size: 0.9em; color: #555; margin-bottom: 8px; }
  .venta-badges { margin-bottom: 10px; }
  .venta-acciones { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.82em;
    font-weight: bold;
    margin-right: 4px;
  }
  .badge-ok   { background: #d5f5e3; color: #1e8449; }
  .badge-pend { background: #fef9e7; color: #b7950b; }
  .badge-ef   { background: #e8f8f5; color: #148f77; }
  .badge-tr   { background: #eaf2ff; color: #1a5276; }

  /* Días */
  .dia-block {
    background: white;
    border-radius: 12px;
    padding: 12px 16px;
    margin: 12px 0;
    box-shadow: 0 3px 10px rgba(0,0,0,0.07);
  }
  .dia-summary {
    font-weight: bold;
    font-size: 1.05em;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    list-style: none;
  }
  .dia-total {
    font-size: 0.9em;
    color: #27ae60;
    font-weight: normal;
  }

  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>

<body>

<h1 style="text-align:center; margin-bottom:0;">🍬 Control Empresarial Alfajores</h1>
<p style="text-align:center; color:#888; margin-top:4px;">Sistema de stock, ventas y pagos</p>

<!-- ===== REGISTRAR PEDIDO ===== -->
<h2>📦 Registrar Pedido</h2>
<div class="card">
  <div class="form-row">
    <select id="saborPedido"></select>
    <input id="cantidadPedido" type="number" placeholder="Cantidad" min="1">
    <input id="precioPedido"   type="number" placeholder="Precio COP" min="0">
    <button onclick="registrarPedido()">Registrar Pedido</button>
  </div>
</div>

<!-- ===== STOCK ===== -->
<h2>📋 Stock Actual</h2>
<div id="stockActual"></div>

<!-- ===== REGISTRAR VENTA ===== -->
<h2>🛒 Registrar Venta</h2>
<div class="card">
  <div class="form-row">
    <select id="saborVenta"></select>
    <input id="cantidadVenta" type="number" placeholder="Cantidad" min="1">
  </div>
  <div class="form-row">
    <input id="clienteVenta" type="text" placeholder="¿A quién le vendiste? (nombre del cliente)">
    <select id="vendedorVenta">
      <option value="Dann">Dann</option>
      <option value="Gio">Gio</option>
    </select>
  </div>
  <div class="form-row">
    <select id="metodoPagoVenta">
      <option value="Efectivo">💵 Efectivo</option>
      <option value="Transferencia">🏦 Transferencia</option>
    </select>
    <select id="estadoPagoVenta">
      <option value="Realizado">✅ Realizado</option>
      <option value="No Realizado">⏳ No Realizado</option>
    </select>
    <button onclick="registrarVenta()">Registrar Venta</button>
  </div>
</div>

<!-- ===== RESUMEN ===== -->
<h2>📊 Resumen General</h2>
<div id="resumen"></div>

<!-- ===== VENTAS POR DÍA ===== -->
<h2>📅 Ventas por Día</h2>
<div id="ventasPorDia"></div>

<!-- ===== VENTAS POR VENDEDOR ===== -->
<h2>🧑‍💼 Ventas por Vendedor</h2>
<details open>
  <summary style="cursor:pointer; font-weight:bold; font-size:1.05em; padding:6px 0;">
    Ventas de Dann
  </summary>
  <div id="ventasDann"></div>
</details>

<details open>
  <summary style="cursor:pointer; font-weight:bold; font-size:1.05em; padding:6px 0;">
    Ventas de Gio
  </summary>
  <div id="ventasGio"></div>
</details>

</body>
</html>
